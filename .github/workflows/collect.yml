name: Collect VPM (SKUs)

# Coletor do Radar de VPM não-aéreo (Shopping). Roda o cron diário e também é o
# alvo do botão "disparar rodada" do admin (workflow_dispatch).
#
# Sem os secrets de Supabase/coletor o job roda em MODO MOCK: calcula a banda a
# partir do basket e grava o payload em out/collect/, sem tocar nenhuma API.
# Só dado público de catálogo trafega — nunca cifra interna/CMI.

on:
  schedule:
    - cron: "0 9 * * *" # 09:00 UTC ~ 06:00 America/Sao_Paulo
  workflow_dispatch:
    inputs:
      mock:
        description: "Forçar modo mock (não chama API mesmo com secrets)"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: collect-vpm
  cancel-in-progress: false

env:
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  collect:
    name: collect
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - name: Collect
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL }}
          MOCK: ${{ inputs.mock }}
        run: |
          set -eu
          ARGS=""
          if [ "${MOCK:-false}" = "true" ]; then ARGS="--mock"; fi
          echo "[collect] node scripts/collect-skus.mjs $ARGS"
          node scripts/collect-skus.mjs $ARGS
      - name: Upload payload (mock/observability)
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: collect-payload
          path: out/collect/
          if-no-files-found: ignore
