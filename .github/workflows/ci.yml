name: CI

# Gate de qualidade do The Loyal. Roda em push e pull request.
# Cobre: lint, typecheck, validate, render, qa, build e publish (indices locais).
# Nenhum job envia e-mail nem toca a API do Beehiiv — publicacao real e manual
# (ver .github/workflows/beehiiv.yml).

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm run lint

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  test:
    # Testes unitarios das funcoes puras editoriais (CPM/VPM/spread, mapa
    # Score->Verdict, taxonomia, gates de emoji/urgencia/dado interno). Zero
    # dependencia: node:test. Blindam o calculo, que nunca passa pelo LLM.
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm test
      # Testes das funcoes puras do v2 (engine/gate/montagem/sintese + boundaries
      # M8/M9). Estavam fora do CI (so tests/ rodava); agora guardam as invariantes
      # do runner diario tambem.
      - run: npm run test:v2
      # Gate de colisao de decisoes (C4): faixas disjuntas por chat + reprova se
      # dois branches declaram o mesmo D-NNN com titulo diferente. Precisa do base
      # para a checagem cross-branch (checkout raso nao traz outros refs).
      - name: fetch base p/ gate de decisoes
        run: git fetch --no-tags --depth=1 origin claude/loyalty-landing-page-v1-7vbjq7 || true
      - run: npm run check:decisions

  editorial:
    # validate -> render -> qa -> publish compartilham o diretorio out/ e por isso
    # rodam como passos sequenciais no mesmo job (o render precede o qa, que audita
    # o HTML gerado). Cada passo bloqueia o pipeline em erro.
    name: editorial-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - name: validate
        run: npm run validate
      - name: render
        run: npm run render
      - name: qa
        run: npm run qa
      - name: publish (indices locais, nao envia e-mail)
        run: npm run publish

  build:
    name: build
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm run build
