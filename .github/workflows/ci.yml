name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Node 22 (LTS): os testes do Radar importam .ts diretamente e dependem do
          # type stripping nativo, default a partir de 22.18. Node 20 falha com
          # ERR_UNKNOWN_FILE_EXTENSION. Next 14 suporta plenamente o 22.
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test (unit)
        run: npm test

      - name: Validate editions (QA gate)
        run: npm run validate

      - name: Render (email + plain + web + QA + manifest)
        run: npm run render

      - name: QA global
        run: npm run qa

      - name: Build (Next.js static)
        run: npm run build
